apis:
  - aid: opentofu:opentofu-cli
    name: OpenTofu CLI
    description: >-
      OpenTofu is a CLI-driven infrastructure-as-code tool forked from
      Terraform. The opentofu binary reads HashiCorp Configuration Language
      (HCL) configuration, plans changes, and applies them against cloud
      providers through their respective APIs. It supports state management
      via local files or pluggable remote state backends, encrypted state
      and plan files, provider plugin distribution through registries, and
      a module ecosystem for composable infrastructure. OpenTofu does not
      itself expose an HTTP API; programmatic interaction happens through
      the CLI, configuration files, and provider/backend plugin protocols.
    humanURL: https://opentofu.org/
    tags:
      - CLI
      - Cloud
      - DevOps
      - HCL
      - Infrastructure as Code
      - Open Source
      - Terraform
